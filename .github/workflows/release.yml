name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          BIN=pb
          if [ "${{ matrix.goos }}" = "windows" ]; then BIN=pb.exe; fi
          go build -trimpath -ldflags="-s -w -X github.com/yesabhishek/pastebin-cli/internal/version.Current=${{ github.ref_name }}" -o "dist/$BIN" ./cmd/pb
      - name: Package archive
        run: |
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip "pb_${{ matrix.goos }}_${{ matrix.goarch }}.zip" pb.exe
          else
            tar -czf "pb_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" pb
          fi
      - name: Upload release artifact
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
